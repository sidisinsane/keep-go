schema_version: "0.1.0"
staleness:
  draft: { days: 7 }
  review: { days: 14 }
  published: { days: 90 }
  canon: { days: null }
completeness:
  min_ratio: 0.7
  required_fields: [ kind, tags ]
  required_relations: 1
extensions:
  custom:
    applies_when:
      kind: custom-kind
    additional_required: [field_a]
    fields:
      field_a:
        type: string
      field_b:
        type: isodate